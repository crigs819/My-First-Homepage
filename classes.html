<html>
    <head><h1>Classes</h1></head>
     <style>

    body {
            background-color: gray;
            color:black;
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
            margin: 0;
        }

    p {
            color:black;
            text-align: center;
            font-style: oblique;
        }


    h1 {
            color:black;
            text-align: center;
            
        }

    h2 {
            color: black;
            text-align: center;
        }

    h3 {
            color: black;
            text-align: center;
        }

    ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow:hidden;
            background-color: rgb(72, 73, 72);
            
        }

    ul li {
            float: left;
        }

    ul li a{
            display: block;
            color:white;
            text-align: center;
            padding: 14px 16px;            
            text-decoration: none;
            
        }

    li a.active {
            background-color: rgb(182, 186, 186);
            color: red;
        }

    a {
            text-align: center;
            color:black;
        }

    li a:hover:not(.active) {

            color: rgb(38, 149, 190);
        }

    .container {
          display: flex;
          align-items: center;         
          justify-content: center;
        }

    .list {
            background-color: gray;
            display: grid;
            text-align: center;
            align-items: center;         
            justify-content: center;
            margin: auto;
            
            
        }

    table {
            background-color: gray;
            display: grid;
            text-align: justify;         
            justify-content: center;
            margin: auto;
            border-collapse: separate;
            border-spacing: 10px 50px 20px;
        }

    td {
            padding: 1px 0;
            border: 1px solid black;
        }

    tr {
            text-align: justify;
            vertical-align: middle;
            padding: 100px;
            border-collapse: separate;
        }

    .dropbtn {
            background-color: blue;
            color: white;
            padding: 16px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

    .dropdown {
            position: relative;
            display: inline-block;
        }

    .dropdown-content {
            display: none;
            position: absolute;
            background-color: blue;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;

        }
    .topnav {
            overflow: hidden;
            background-color: rgb(76, 78, 78);

        }
    .topnav a {
            float:left;
            color:black;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            font-size: 17px;
        }
        .topnav a:hover {
            background-color: #ddd;
            color:black;
        }
        .topnav a.active {
            background-color: rgb(27, 83, 162);
            color: white;
        }
        
    </style>
