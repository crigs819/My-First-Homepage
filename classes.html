body {

.navbar {
        position: sticky;
        top: 5px;
        clear: both;
        width: 100%;
    }

.navbar ul {
            list-style-type: none;
            padding-left: 0;
            
            
        }

.navbar ul li {
        
        text-align: center;
        display: inline;
        width: 19%;
        float: left;
        margin-right: .5em;
    }

.navbar ul li a {
        font-family: Arial, Helvetica, sans-serif;

        color: white;
        display: block;
        padding: .35em;
    }

.navbar a {
        background-color: rgb(44, 43, 43);

    }

.navbar a:hover {
        background-color: rgb(93, 91, 91);

    }
.navbar a.active {
        background-color: rgb(18, 102, 98);

    }

.container {
          display: flex;
          align-items: center;         
          justify-content: center;
        }

.list {
            background-color: gray;
            display: grid;
            text-align: center;
            align-items: center;         
            justify-content: center;
            margin: auto;
            
            
        }

table {
            background-color: gray;
            display: grid;
            text-align: justify;         
            justify-content: center;
            margin: auto;
            border-collapse: separate;
            border-spacing: 10px 50px 20px;
            text-decoration: none;
        }

    

td {
            padding: 1px 0;
            border: 1px solid black;
        }

    

tr {
            text-align: justify;
            vertical-align: middle;
            padding: 100px;
            border-collapse: separate;
        }

    

.dropbtn {
            background-color: blue;
            color: white;
            padding: 16px;
            font-size: 16px;
            border: none;
            cursor: pointer;
        }

.dropdown {
            position: relative;
            display: inline-block;
        }

.dropdown-content {
            display: none;
            position: absolute;
            background-color: blue;
            min-width: 160px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            z-index: 1;

        }
      
body.dark-theme {
        color: white;
        background-color: black;
        text-decoration: none;
    }

body.dark-theme p {
        color: white;
        background-color: black;
        text-decoration: none;
    }

body.dark-theme h1 {

    }

body.dark-theme h2 {
        color: white;
        background-color: black;
    }

body.dark-theme h3 {

    }

body.dark-theme table {

    }

body.dark-theme td {
        color: white;
        background-color: black;
    }

body.dark-theme tr {
        color: white;
        background-color: black;
    }
